name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run validation without publishing"
        required: true
        default: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"
      - name: Validate version
        shell: bash
        run: |
          VERSION="$(gradle properties -q | awk '/^version:/ {print $2}')"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Gradle version ${VERSION}" >&2
            exit 1
          fi
      - run: gradle spotlessCheck test javadoc publishToMavenLocal
      - run: gradle publishMavenJavaPublicationToMavenLocal
      - uses: actions/upload-artifact@v4
        with:
          name: maven-local-artifacts
          path: ~/.m2/repository/com/vzaps/vzaps-sdk/0.1.0

  publish:
    needs: build
    if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"
      - name: Export GPG public key for JReleaser
        shell: bash
        run: |
          printf '%s' "$SIGNING_KEY" | gpg --batch --import
          {
            echo 'JRELEASER_GPG_PUBLIC_KEY<<EOF'
            gpg --batch --armor --export
            echo EOF
          } >> "$GITHUB_ENV"
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      - name: Publish to Maven Central
        run: gradle publish jreleaserDeploy --no-configuration-cache
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.SIGNING_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.SIGNING_PASSWORD }}
