name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [11, 17, 21]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"
      - run: gradle spotlessCheck
      - run: gradle test
      - run: gradle jacocoTestReport
      - run: gradle javadoc
      - run: gradle jar sourcesJar javadocJar
      - run: gradle publishToMavenLocal
      - name: Validate Gradle consumer
        shell: bash
        run: |
          mkdir -p /tmp/vzaps-gradle-consumer/src/main/java/app
          cd /tmp/vzaps-gradle-consumer
          cat > settings.gradle.kts <<'EOF'
          rootProject.name = "vzaps-gradle-consumer"
          EOF
          cat > build.gradle.kts <<'EOF'
          plugins { application }
          repositories { mavenLocal(); mavenCentral() }
          dependencies { implementation("com.vzaps:vzaps-sdk:0.1.0") }
          application { mainClass.set("app.Main") }
          EOF
          cat > src/main/java/app/Main.java <<'EOF'
          package app;
          import com.vzaps.VZapsClient;
          public final class Main {
            public static void main(String[] args) {
              System.out.println(VZapsClient.class.getName());
            }
          }
          EOF
          gradle build
